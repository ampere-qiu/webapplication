site_name: 'プログラミング演習2'
site_description: 'This page describes exercises for Programming Practice 2 in FSD course.'
site_author: 'Yohei Murakami'
site_url: 'https://fsd-programming2.github.io/programming2/'

nav:
    - Week 1: 'index.md'
    - Week 2: 'index2.md'
    - Week 3: 'index3.md'
    - Week 4: 'index4.md'
    - Week 5: 'index5.md'
    - Week 6: 'index6.md'
    - Week 7: 'index7.md'
    - Week 8: 'index8.md' # Week7でdef_heapを作るのでコメントアウト
    # - Week 9: 'index9.md'
    # - Week 10: 'index10.md' # Week9でdef_graphを作るのでコメントアウト
    # - Week 11: 'index11.md'
    # - Week 12: 'index12.md'
    - 復習：クラスとは: 'whatisclass.md'
    - Pythonの基本的なエラー一覧: 'errorlist.md'

copyright: 'Copyright (c) 2022'
theme:
    name: material
    logo: image/logo.svg
    favicon: image/favicon.jpg
    font:
        text: Roboto
    language: ja
    palette:
        # scheme: default
        # primary: brown
        # accent: pink
        - scheme: programming2
          toggle:
              icon: material/toggle-switch-off-outline
              name: Switch to dark mode
        - scheme: slate
          toggle:
              icon: material/toggle-switch
              name: Switch to light mode
    features:
        - content.tabs.link
        - navigation.top
        # - toc.integrate
markdown_extensions:
    - attr_list
    - admonition
    - meta
    - mdx_math:
        enable_dollar_delimiter: true
    - pymdownx.tabbed:
        alternate_style: true
    - pymdownx.critic
    - pymdownx.caret
    - pymdownx.keys
    - pymdownx.tilde
    - pymdownx.mark
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.superfences
    - pymdownx.snippets
    - pymdownx.smartsymbols
    - pymdownx.details
    - footnotes
    - toc:
        permalink: true
    - pymdownx.emoji:
        emoji_index: !!python/name:materialx.emoji.twemoji
        emoji_generator: !!python/name:materialx.emoji.to_svg
    # - fontawesome_markdown
    - md_in_html
    - def_list

extra_javascript:
    - http://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML

extra_css:
    - "https://fonts.googleapis.com/earlyaccess/notosansjp.css"
    - "https://fonts.googleapis.com/css?family=Open+Sans:600,800"
    - "https://fonts.googleapis.com/icon?family=Material+Icons"
    - "https://use.fontawesome.com/releases/v5.14.0/css/all.css"
    - stylesheets/extra.css

extra:
  analytics:
    provider: google
    property: G-JKE5QGM6SL
